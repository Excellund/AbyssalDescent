name: Build And Release Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6-stable
      GODOT_VERSION_DIR: 4.6.stable
      EXPORT_NAME: AbyssalDescent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip zip

      - name: Download Godot and export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O godot.zip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -O templates.tpz

          unzip -q godot.zip
          unzip -q templates.tpz

          chmod +x "Godot_v${GODOT_VERSION}_linux.x86_64"
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          mv templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION_DIR}/"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          sed -i "s/^config\/version=.*/config\/version=\"${VERSION}\"/" project.godot
          sed -i "s/^const GAME_VERSION := .*/const GAME_VERSION := \"${VERSION}\"/" scripts/build_info.gd
          printf "%s\n" "${VERSION}" > build_version.txt
          echo "✓ Script version created: $(grep -E '^const GAME_VERSION' scripts/build_info.gd)"
          echo "✓ Version stamp created: $(cat build_version.txt)"
          grep -q "^const GAME_VERSION := \"${VERSION}\"" scripts/build_info.gd || (echo "ERROR: scripts/build_info.gd version mismatch" && exit 1)
          test -s build_version.txt || (echo "ERROR: build_version.txt is empty" && exit 1)

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          "./Godot_v${GODOT_VERSION}_linux.x86_64" --headless --path . --export-release "Windows Desktop" "build/windows/${EXPORT_NAME}.exe"

      - name: Create release artifacts
        run: |
          cat > latest_release.json <<EOF
          {
            "latest_version": "${RELEASE_VERSION}",
            "download_url": "https://github.com/Excellund/AbyssalDescent/releases/download/v${RELEASE_VERSION}/${EXPORT_NAME}-Windows.zip",
            "release_page_url": "https://github.com/Excellund/AbyssalDescent/releases/tag/v${RELEASE_VERSION}"
          }
          EOF
          cd build/windows
          cp ../../build_version.txt ./build_version.txt
          zip -q "../../${EXPORT_NAME}-Windows.zip" "${EXPORT_NAME}.exe" "build_version.txt"
          cd ../..
          sha256sum "${EXPORT_NAME}-Windows.zip" > "${EXPORT_NAME}-Windows.zip.sha256"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AbyssalDescent-Windows.zip
            AbyssalDescent-Windows.zip.sha256
            latest_release.json
          generate_release_notes: true
